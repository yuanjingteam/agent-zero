<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<title>思维链 — 退货决策</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --surface-000: #0A0A0C;
    --surface-100: #111114;
    --surface-200: #18181C;
    --surface-300: #1F1F24;
    --text-primary: #F0F0F2;
    --text-secondary: #A0A0A8;
    --text-tertiary: #6B6B74;
    --accent-ice: #B8C4D0;
    --border: rgba(255,255,255,0.06);
    --border-subtle: rgba(255,255,255,0.08);
    --color-success: #4ADE80;
    --color-warning: #FBBF24;
    --color-error: #F87171;
    --color-info: #60A5FA;
    --glow-medium: rgba(255,255,255,0.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--surface-000); color: var(--text-primary); }
  body {
    font-family: 'Inter', 'Space Grotesk', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    font-size: 14px;
  }
  .page { max-width: 1440px; margin: 0 auto; padding: 32px 32px 40px; }

  header {
    margin-bottom: 24px; padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .title-row { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; flex-wrap: wrap; }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1.25rem; font-weight: 700; color: var(--text-primary);
    letter-spacing: -0.015em;
  }
  .subtitle { margin-top: 4px; color: var(--text-secondary); font-size: 0.85rem; }
  .case-badge {
    border: 1px solid var(--border);
    background: var(--surface-100);
    color: var(--text-tertiary);
    border-radius: 6px; padding: 4px 10px; font-size: 0.72rem;
    font-family: 'JetBrains Mono', monospace;
  }

  .scoreboard {
    display: grid; grid-template-columns: repeat(5, minmax(160px, 1fr));
    gap: 0; margin-bottom: 24px;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--surface-100); overflow: hidden;
    position: relative;
  }
  .scoreboard::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background: radial-gradient(ellipse 80% 50% at 50% 120%, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .metric {
    padding: 14px 16px;
    border-right: 1px solid var(--border);
    position: relative; z-index: 1;
  }
  .metric:last-child { border-right: none; }
  .metric .k {
    color: var(--text-tertiary); font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500;
    font-family: 'Space Grotesk', sans-serif;
  }
  .metric .v {
    margin-top: 6px; font-size: 1.1rem; font-weight: 600; color: var(--text-primary);
    font-family: 'Space Grotesk', sans-serif;
  }
  .metric.decision .v { text-transform: capitalize; }
  .metric.policy .v { text-transform: capitalize; }

  .section-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.07em;
    color: var(--text-tertiary); font-weight: 600; margin-bottom: 10px;
  }

  .timeline {
    display: grid;
    grid-template-columns: repeat(5, minmax(220px, 1fr));
    gap: 10px;
    margin-bottom: 24px;
  }
  .phase {
    background: var(--surface-100);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
    position: relative;
  }
  .phase::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background: radial-gradient(ellipse 80% 50% at 50% 120%, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .phase-head {
    padding: 12px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
    position: relative; z-index: 1;
  }
  .phase-num {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--surface-200); color: var(--text-tertiary);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem; font-weight: 600;
    border: 1px solid var(--border);
  }
  .phase.facts .phase-num { color: var(--color-info); border-color: rgba(96,165,250,0.2); background: rgba(96,165,250,0.08); }
  .phase.red .phase-num { color: var(--color-warning); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.08); }
  .phase.legit .phase-num { color: var(--color-success); border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.08); }
  .phase.policy .phase-num { color: var(--accent-ice); border-color: rgba(184,196,208,0.15); background: rgba(184,196,208,0.06); }
  .phase.decision .phase-num { color: var(--color-info); border-color: rgba(96,165,250,0.2); background: rgba(96,165,250,0.08); }
  .phase h3 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
  }
  .phase .tag {
    margin-left: auto; font-size: 0.68rem; color: var(--text-tertiary);
  }

  .phase-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 10px; position: relative; z-index: 1; }

  .list { display: flex; flex-direction: column; }
  .item {
    font-size: 0.78rem; line-height: 1.5; color: var(--text-secondary);
    padding: 8px 0; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; gap: 8px;
  }
  .item:last-child { border-bottom: none; }
  .item b { font-weight: 600; color: var(--text-primary); }
  .item .label-text { color: var(--text-tertiary); font-weight: 500; }

  .status {
    display: inline-flex; align-items: center;
    font-size: 0.66rem; font-weight: 600;
    padding: 1px 7px; border-radius: 4px;
    border: 1px solid; line-height: 1.5;
    text-transform: uppercase; letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .status.pass { color: var(--color-success); border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.08); }
  .status.fail { color: var(--color-error); border-color: rgba(248,113,113,0.2); background: rgba(248,113,113,0.08); }
  .status.review { color: var(--color-warning); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.08); }
  .status.neutral { color: var(--text-tertiary); border-color: var(--border); background: var(--surface-200); }

  .strength {
    display: inline-flex; align-items: center;
    font-size: 0.64rem; font-weight: 600;
    padding: 1px 6px; border-radius: 4px;
    border: 1px solid; line-height: 1.5;
    text-transform: uppercase; letter-spacing: 0.04em;
    flex-shrink: 0;
  }
  .strength.high { color: var(--color-success); border-color: rgba(74,222,128,0.2); background: rgba(74,222,128,0.08); }
  .strength.medium { color: var(--color-warning); border-color: rgba(251,191,36,0.2); background: rgba(251,191,36,0.08); }
  .strength.low { color: var(--text-tertiary); border-color: var(--border); background: var(--surface-200); }

  .meter { margin-top: auto; padding-top: 10px; }
  .meter .label {
    font-size: 0.68rem; color: var(--text-tertiary); margin-bottom: 6px;
    display: flex; justify-content: space-between;
  }
  .meter .label span:last-child { font-weight: 600; color: var(--text-secondary); }
  .bar {
    width: 100%; height: 4px; border-radius: 999px;
    background: var(--surface-300); overflow: hidden;
  }
  .fill { height: 100%; border-radius: 999px; }
  .fill.fraud { background: var(--color-warning); }
  .fill.legit { background: var(--color-success); }

  .decision-panel {
    background: var(--surface-100); border: 1px solid var(--border);
    border-radius: 10px; padding: 18px 20px;
    position: relative; overflow: hidden;
  }
  .decision-panel::after {
    content: '';
    position: absolute; inset: 0;
    border-radius: inherit;
    background: radial-gradient(ellipse 80% 50% at 50% 120%, rgba(255,255,255,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .decision-panel h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.68rem; letter-spacing: 0.07em;
    text-transform: uppercase; font-weight: 500;
    color: var(--text-tertiary); margin-bottom: 10px;
  }
  .reasoning {
    font-size: 0.85rem; line-height: 1.65; color: var(--text-secondary);
    position: relative; z-index: 1;
  }

  @media (max-width: 1100px) {
    .scoreboard { grid-template-columns: repeat(2, 1fr); }
    .metric { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .metric:nth-child(2n) { border-right: none; }
    .timeline { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <main class="page">
    <header>
      <div class="title-row">
        <div>
          <h1>思维链 — 退货决策</h1>
          <div class="subtitle">在最终行动前，通过五个明确阶段进行结构化推理。</div>
        </div>
        <div class="case-badge">Case RET-2026-0414</div>
      </div>
    </header>

    <section class="scoreboard">
      <article class="metric decision"><div class="k">最终决策</div><div class="v" id="mDecision"></div></article>
      <article class="metric"><div class="k">置信度</div><div class="v" id="mConfidence"></div></article>
      <article class="metric"><div class="k">欺诈评分</div><div class="v" id="mFraud"></div></article>
      <article class="metric"><div class="k">正当性评分</div><div class="v" id="mLegit"></div></article>
      <article class="metric policy"><div class="k">政策结果</div><div class="v" id="mPolicy"></div></article>
    </section>

    <div class="section-title">推理阶段</div>
    <section class="timeline" id="timeline"></section>

    <section class="decision-panel">
      <h2>决策推理</h2>
      <div class="reasoning" id="reasoning"></div>
    </section>
  </main>

<script>
const D = {"returnCase":{"request_id":"RET-2026-0414","customer_id":"CUST-90871","product":"无线降噪耳机 X2","order_date":"2026-03-29","delivery_date":"2026-04-01","request_date":"2026-04-24","claimed_reason":"右耳罩间歇性声音中断","claim_timing_days_after_delivery":23,"order_value_eur":189,"return_count_last_12_months":3,"previous_high_value_returns":2,"account_age_months":46,"payment_method":"credit_card_verified","shipping_address_matches_payment":true,"diagnostic_log_uploaded":true,"photo_evidence_uploaded":false,"replacement_requested":true},"policy":{"return_window_days":30,"max_high_value_returns_12m_before_manual_review":2,"mandatory_manual_review_amount_eur":250,"allowed_outcomes":["approve","reject","manual_review"]},"facts":{"extracted_facts":["request_id","customer_id","product","order_date","delivery_date","request_date","claimed_reason","claim_timing_days_after_delivery","order_value_eur","return_count_last_12_months","previous_high_value_returns","account_age_months","payment_method","shipping_address_matches_payment","diagnostic_log_uploaded"],"missing_information":["photo_evidence_uploaded"]},"redFlags":{"checkpoints":[{"check":"近期频繁退货行为","status":"present","evidence":"该客户在过去12个月内已退货3次，最近一次退货发生在收货后23天。"},{"check":"高额退货模式","status":"not_present","evidence":"退货金额为189欧元，低于以往高额退货阈值（2次）。"},{"check":"支付/收货身份不一致","status":"not_present","evidence":"支付方式为已验证信用卡，且收货地址与支付方式一致。"},{"check":"缺陷证据薄弱或缺失","status":"not_present","evidence":"已上传诊断日志，但未提供照片证据。"},{"check":"具有策略性的时间模式","status":"not_present","evidence":"退货发生在收货后23天，不属于策略性时间安排。"},{"check":"账户行为异常","status":"not_present","evidence":"该账户已注册46个月，客户有2次高额退货记录。"}],"fraud_score":6,"fraud_rationale":"该客户在过去12个月内有3次退货记录，但退货金额低于以往高额退货阈值。账户已注册46个月，客户有2次高额退货记录。退货发生在收货后23天，不属于策略性时间安排。支付方式和收货地址一致。已上传诊断日志，但未提供照片证据。"},"legitimacy":{"customer_supporting_points":[{"point":"客户报告右耳罩间歇性声音中断，这是无线耳机的常见问题。","strength":"high","evidence":"客户提供了详细的问题描述，包括右耳罩的具体问题。"},{"point":"已上传诊断日志，提供了关于该问题的技术细节。","strength":"high","evidence":"客户上传了诊断日志，其中包含声音中断的详细信息和潜在原因。"},{"point":"客户要求换货，这是产品缺陷的标准处理流程。","strength":"high","evidence":"客户明确要求对缺陷产品进行换货。"},{"point":"该索赔在收货后23天内提出，属于电子产品问题报告的典型时间范围。","strength":"high","evidence":"索赔在收货后23天内提出，考虑到产品性质和问题显现所需的时间，这是合理的。"}],"legitimacy_score":7,"legitimacy_rationale":"客户提供了详细的产品缺陷描述，上传了诊断日志，并在合理的时间范围内要求换货。该问题对无线产品而言是合理的，且索赔在典型的报告窗口期内提出。"},"policyResult":{"policy_checks":[{"rule":"退货窗口期 <= 30天","status":"pass","reason":"退货窗口期为23天，在允许的30天期限内。"},{"rule":"12个月内最大高额退货次数（触发人工审核前）","status":"pass","reason":"高额退货次数（2次）在允许的限制范围内（2次）。"},{"rule":"强制人工审核金额（250欧元）","status":"pass","reason":"订单金额为189欧元，低于250欧元的强制人工审核阈值。"},{"rule":"允许的结果：approve、reject、manual_review","status":"pass","reason":"政策结果已按要求设置为'manual_review'。"}],"policy_outcome":"manual_review"},"decision":{"final_decision":"manual_review","confidence":0.79,"decision_reasoning":"该客户在过去12个月内有3次退货记录，但退货金额低于以往高额退货阈值。账户已注册46个月，客户有2次高额退货记录。退货发生在收货后23天，不属于策略性时间安排。支付方式和收货地址一致。已上传诊断日志，但未提供照片证据。客户提供了详细的产品缺陷描述，上传了诊断日志，并在合理的时间范围内要求换货。该问题对无线产品而言是合理的，且索赔在典型的报告窗口期内提出。政策结果已按要求设置为'manual_review'。综合考虑风险平衡，置信度为0.79。决定启动人工审核以进一步评估该索赔。","customer_message":"我们目前正在审核您的索赔，将很快联系您讨论后续步骤。请耐心等待，如有需要请提供补充信息。","internal_note":"该客户有3次退货记录，但退货金额低于以往高额退货阈值。账户已注册46个月，客户有2次高额退货记录。退货发生在收货后23天，不属于策略性时间安排。支付方式和收货地址一致。已上传诊断日志，但未提供照片证据。客户提供了详细的产品缺陷描述，上传了诊断日志，并在合理的时间范围内要求换货。该问题对无线产品而言是合理的，且索赔在典型的报告窗口期内提出。政策结果已按要求设置为'manual_review'。综合考虑风险平衡，置信度为0.79。"}};
const timeline = document.getElementById("timeline");

function escapeHtml(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
}

function statusBadge(raw) {
  const x = String(raw || "").toLowerCase();
  if (x === "present" || x === "pass") return `<span class="status pass">${escapeHtml(raw)}</span>`;
  if (x === "not_present" || x === "fail") return `<span class="status fail">${escapeHtml(raw)}</span>`;
  if (x === "manual_review_trigger" || x === "manual_review") return `<span class="status review">${escapeHtml(raw)}</span>`;
  return `<span class="status neutral">${escapeHtml(raw || "unclear")}</span>`;
}

function strengthBadge(raw) {
  const x = String(raw || "").toLowerCase();
  const cls = (x === "high" || x === "medium" || x === "low") ? x : "low";
  return `<span class="strength ${cls}">${escapeHtml(raw)}</span>`;
}

function makePhase({ cls, num, title, tag, lines, meter }) {
  const el = document.createElement("article");
  el.className = `phase ${cls}`;

  const head = document.createElement("div");
  head.className = "phase-head";
  head.innerHTML =
    '<span class="phase-num">' + num + '</span>' +
    '<h3>' + escapeHtml(title) + '</h3>' +
    '<span class="tag">' + escapeHtml(tag) + '</span>';
  el.appendChild(head);

  const body = document.createElement("div");
  body.className = "phase-body";

  const list = document.createElement("div");
  list.className = "list";
  lines.forEach((html) => {
    const item = document.createElement("div");
    item.className = "item";
    item.innerHTML = html;
    list.appendChild(item);
  });
  body.appendChild(list);

  if (meter) {
    const m = document.createElement("div");
    m.className = "meter";
    const pct = Math.max(0, Math.min(100, meter.value * 10));
    m.innerHTML =
      '<div class="label"><span>' + escapeHtml(meter.label) + '</span><span>' + meter.value.toFixed(1) + '/10</span></div>' +
      '<div class="bar"><div class="fill ' + meter.kind + '" style="width:' + pct + '%"></div></div>';
    body.appendChild(m);
  }

  el.appendChild(body);
  return el;
}

const facts = (D.facts.extracted_facts || []).slice(0, 5).map((f) => {
  return `<span>${escapeHtml(f)}</span>`;
});
const red = (D.redFlags.checkpoints || []).slice(0, 5).map((c) => {
  return `<span class="label-text">${escapeHtml(c.check)}</span>${statusBadge(c.status)}`;
});
const legit = (D.legitimacy.customer_supporting_points || []).slice(0, 5).map((p) => {
  return `<span>${escapeHtml(p.point)}</span>${strengthBadge(p.strength)}`;
});
const rules = (D.policyResult.policy_checks || []).slice(0, 5).map((r) => {
  return `<span class="label-text">${escapeHtml(r.rule)}</span>${statusBadge(r.status)}`;
});
const decisionLines = [
  `<span class="label-text">客户</span><span>${escapeHtml(D.decision.customer_message || "n/a")}</span>`,
  `<span class="label-text">内部</span><span>${escapeHtml(D.decision.internal_note || "n/a")}</span>`
];

timeline.appendChild(makePhase({
  cls: "facts", num: "1", title: "事实", tag: "不做判断",
  lines: facts.length ? facts : ['<span>未提取到事实</span>']
}));
timeline.appendChild(makePhase({
  cls: "red", num: "2", title: "风险标记", tag: "欺诈筛查",
  lines: red.length ? red : ['<span>无风险标记检查</span>'],
  meter: { label: "欺诈评分", value: Number(D.redFlags.fraud_score || 0), kind: "fraud" }
}));
timeline.appendChild(makePhase({
  cls: "legit", num: "3", title: "正当性", tag: "客户视角",
  lines: legit.length ? legit : ['<span>无正当性要点</span>'],
  meter: { label: "正当性评分", value: Number(D.legitimacy.legitimacy_score || 0), kind: "legit" }
}));
timeline.appendChild(makePhase({
  cls: "policy", num: "4", title: "政策检查", tag: "规则约束",
  lines: rules.length ? rules : ['<span>无政策检查</span>']
}));
timeline.appendChild(makePhase({
  cls: "decision", num: "5", title: "决策", tag: "最终输出",
  lines: decisionLines
}));

document.getElementById("mDecision").textContent = D.decision.final_decision || "n/a";
document.getElementById("mConfidence").textContent = Number(D.decision.confidence || 0).toFixed(2);
document.getElementById("mFraud").textContent = `${Number(D.redFlags.fraud_score || 0).toFixed(1)}/10`;
document.getElementById("mLegit").textContent = `${Number(D.legitimacy.legitimacy_score || 0).toFixed(1)}/10`;
document.getElementById("mPolicy").textContent = D.policyResult.policy_outcome || "n/a";
document.getElementById("reasoning").textContent = D.decision.decision_reasoning || "";
</script>
</body>
</html>
